<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>保安專家挑戰賽</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #2c3e50; color: white; padding: 20px; }
        #wheel { width: 250px; height: 250px; border: 10px solid #f1c40f; border-radius: 50%; margin: 20px auto; display: flex; align-items: center; justify-content: center; cursor: pointer; background: conic-gradient(red 0deg 72deg, blue 72deg 144deg, green 144deg 216deg, orange 216deg 288deg, purple 288deg 360deg); }
        .hidden { display: none; }
        #quiz-box { background: white; color: black; padding: 20px; border-radius: 10px; max-width: 500px; margin: auto; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>機場保安挑戰</h1>
    <div id="wheel" onclick="spin()">點擊轉盤抽類別</div>
    
    <div id="quiz-box" class="hidden">
        <h3 id="category-title"></h3>
        <p id="q-text"></p>
        <div id="options"></div>
        <p id="status"></p>
    </div>

    <script>
        const quizData = {
            "禁區管制": [
                {q: "禁區門應保持？", a: ["關閉", "開啟"], correct: 0},
                // ... 這裡請填入你的 5 題題目
            ]
        };
        
        let currentCat = "", qIndex = 0, score = 0;

        function spin() {
            const cats = Object.keys(quizData);
            currentCat = cats[Math.floor(Math.random() * cats.length)];
            document.getElementById('wheel').classList.add('hidden');
            document.getElementById('quiz-box').classList.remove('hidden');
            qIndex = 0; score = 0;
            loadQuestion();
        }

        function loadQuestion() {
            if(qIndex >= 5) {
                alert(score >= 4 ? "恭喜！請領取禮品。" : "可惜未達標，再接再厲！");
                location.reload(); return;
            }
            const q = quizData[currentCat][qIndex];
            document.getElementById('category-title').innerText = "類別：" + currentCat;
            document.getElementById('q-text').innerText = q.q;
            const opt = document.getElementById('options');
            opt.innerHTML = '';
            q.a.forEach((txt, i) => {
                let b = document.createElement('button');
                b.innerText = txt;
                b.onclick = () => {
                    if(i === q.correct) score++;
                    qIndex++;
                    loadQuestion();
                };
                opt.appendChild(b);
            });
        }
    </script>
</body>
</html>
