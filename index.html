<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>機場禁區通行證基本知識小測試</title>
    <style>
        body { 
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif; 
            margin: 0; padding: 20px;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white; 
            text-align: center; 
            min-height: 100vh;
        }

        .card { 
            background: linear-gradient(180deg, #1a2a6c 0%, #050a20 100%); 
            border: 2px solid #c5a059; 
            padding: 25px; 
            border-radius: 25px; 
            margin: 20px auto; 
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        h1 { font-size: 1.5em; margin-bottom: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        #card-title { font-size: 1.8em; color: #f1c40f; margin-bottom: 10px; }
        p { font-size: 1.1em; color: #dcdcdc; margin-bottom: 20px; }

        /* 這裡修正了排版：使用 flex 垂直排列，確保整齊 */
        .grid { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            margin-top: 10px; 
        }

        button { 
            width: 100%;
            padding: 18px; 
            font-size: 1.1em; 
            border: 2px solid #444; 
            border-radius: 12px; 
            background: #2c3e50; 
            color: white; 
            cursor: pointer; 
            transition: 0.3s;
        }

        button.selected { 
            background: #c5a059; 
            border-color: #fff; 
            font-weight: bold; 
            box-shadow: 0 0 20px #c5a059;
            transform: scale(1.02);
        }

        #submit-btn { 
            margin-top: 30px; 
            padding: 20px; 
            background: linear-gradient(90deg, #27ae60, #2ecc71); 
            border: none; 
            font-size: 1.3em; 
            font-weight: bold;
            border-radius: 50px; 
            width: 100%;
            color: white;
            cursor: pointer;
        }

        #card-img { width: 100%; max-width: 220px; border-radius: 12px; margin-bottom: 20px; border: 3px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <h1>機場禁區通行證基本知識小測試</h1>
    <div class="card">
        <img id="card-img" src="紅證.png" alt="通行證">
        
        <h2 id="card-title">紅色通行證</h2>
        <p>此證可進入哪些區域？(可選多個)</p>
        
        <div class="grid" id="area-options">
            <button onclick="toggle(this)" data-id="0">客運大樓</button>
            <button onclick="toggle(this)" data-id="1">客運停機坪</button>
            <button onclick="toggle(this)" data-id="2">貨運停機坪</button>
            <button onclick="toggle(this)" data-id="3">維修基地及長期停機坪</button>
            <button onclick="toggle(this)" data-id="4">跑道及滑行道</button>
            <button onclick="toggle(this)" data-id="5">所有區域，包括跑道及滑行道</button>
            <button onclick="toggle(this)" data-id="6">所有區域，但不包括跑道及滑行道</button>
        </div>
        
        <button id="submit-btn" onclick="submit()">提交答案</button>
    </div>

<script>
    const challenges = [
        { cardName: "紅色通行證", imgSrc: "紅證.png", correct: [5] },
        { cardName: "紫色通行證", imgSrc: "紫證.png", correct: [6] },
        { cardName: "黃色通行證", imgSrc: "黃證.png", correct: [0] },
        { cardName: "橙色通行證", imgSrc: "橙證.png", correct: [1,2,3] },
        { cardName: "綠色通行證", imgSrc: "綠證.png", correct: [1,2,3,4] },
        { cardName: "藍色通行證", imgSrc: "藍證.png", correct: [2] },
        { cardName: "杏色通行證", imgSrc: "杏證.png", correct: [3] }
    ];
    
    let currentIdx = 0;
    
    function toggle(btn) {
        btn.classList.toggle('selected');
    }

    function submit() {
        const selected = Array.from(document.querySelectorAll('.selected')).map(b => parseInt(b.dataset.id));
        const correct = challenges[currentIdx].correct;
        
        const isMatch = selected.length === correct.length && selected.every(val => correct.includes(val));
        
        if (isMatch) {
            alert("✅ 正確！權限核准。");
        } else {
            alert("❌ 權限不符，請重新核對批註！");
        }
        
        currentIdx = (currentIdx + 1) % challenges.length;
        
        document.getElementById('card-title').innerText = challenges[currentIdx].cardName;
        document.getElementById('card-img').src = challenges[currentIdx].imgSrc;
        
        document.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
    }
</script>
</body>
</html>
