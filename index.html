<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>保安挑戰 - 幸運轉盤</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #1a2a6c; color: white; padding: 20px; }
        
        /* 轉盤容器與指針 */
        .wheel-container { position: relative; margin: 20px auto; width: 300px; }
        #wheel { 
            width: 300px; height: 300px; border: 10px solid #f1c40f; border-radius: 50%; 
            background: conic-gradient(#e74c3c 0deg 72deg, #3498db 72deg 144deg, #2ecc71 144deg 216deg, #f39c12 216deg 288deg, #9b59b6 288deg 360deg);
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; font-size: 1.2em;
        }
        /* 指針 */
        .pointer { position: absolute; top: -20px; left: 50%; margin-left: -15px; color: red; font-size: 40px; text-shadow: 2px 2px 2px #000; }

        .hidden { display: none; }
        #quiz-box { background: white; color: #333; padding: 30px; border-radius: 20px; max-width: 500px; margin: auto; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        button { background: #34495e; color: white; border: none; padding: 12px 25px; margin: 5px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #2c3e50; transform: scale(1.05); }
    </style>
</head>
<body>

    <h1>中航明捷保安挑戰</h1>
    <div class="wheel-container">
        <div class="pointer">▼</div>
        <div id="wheel" onclick="spin()">點擊轉動</div>
    </div>
    
    <div id="quiz-box" class="hidden">
        <h2 id="category-title"></h2>
        <p id="q-text" style="font-size: 1.2em;"></p>
        <div id="options"></div>
    </div>

    <script>
        const quizData = {
            "禁區管制": [{q: "禁區門應保持？", a: ["開啟", "關閉"], correct: 1}, {q: "Q2", a: ["A", "B"], correct: 0}, {q: "Q3", a: ["A", "B"], correct: 0}, {q: "Q4", a: ["A", "B"], correct: 0}, {q: "Q5", a: ["A", "B"], correct: 0}],
            "證件審核": [{q: "E字批註代表？", a: ["行李區", "辦公區"], correct: 0}, {q: "Q2", a: ["A", "B"], correct: 0}, {q: "Q3", a: ["A", "B"], correct: 0}, {q: "Q4", a: ["A", "B"], correct: 0}, {q: "Q5", a: ["A", "B"], correct: 0}]
        };
        
        let currentCat = "", qIndex = 0, score = 0;

        function spin() {
            const wheel = document.getElementById('wheel');
            const randomRotation = Math.floor(Math.random() * 1080) + 1440; // 轉多圈
            wheel.style.transform = `rotate(${randomRotation}deg)`;
            
            setTimeout(() => {
                const cats = Object.keys(quizData);
                currentCat = cats[Math.floor(Math.random() * cats.length)];
                document.getElementById('wheel').parentElement.classList.add('hidden');
                document.getElementById('quiz-box').classList.remove('hidden');
                loadQuestion();
            }, 4000);
        }

        function loadQuestion() {
            if(qIndex >= 5) {
                alert(score >= 4 ? "恭喜你！獲得精美禮品一份！" : "可惜未達標，多謝參與！");
                location.reload(); return;
            }
            const q = quizData[currentCat][qIndex];
            document.getElementById('category-title').innerText = "挑戰類別：" + currentCat;
            document.getElementById('q-text').innerText = (qIndex + 1) + ". " + q.q;
            const opt = document.getElementById('options');
            opt.innerHTML = '';
            q.a.forEach((txt, i) => {
                let b = document.createElement('button');
                b.innerText = txt;
                b.onclick = () => {
                    if(i === q.correct) score++;
                    qIndex++;
                    loadQuestion();
                };
                opt.appendChild(b);
            });
        }
    </script>
</body>
</html>
