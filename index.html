<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>保安智能驗證系統</title>
    <style>
        :root { --main-blue: #0a2540; --accent-gold: #c5a059; }
        body { font-family: 'Helvetica Neue', sans-serif; background: #000; color: #fff; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden; }
        
        /* 頂部掃描條動畫 */
        .scan-line { position: absolute; top: 0; width: 100%; height: 2px; background: rgba(0,255,255,0.5); animation: scan 3s linear infinite; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }

        #game-area { width: 90%; max-width: 500px; text-align: center; margin-top: 50px; }
        .card-display { background: var(--main-blue); border: 2px solid var(--accent-gold); padding: 40px; border-radius: 15px; margin-bottom: 30px; font-size: 1.5em; letter-spacing: 2px; box-shadow: 0 0 20px rgba(197,160,89,0.3); }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { padding: 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        
        /* 通行證顏色按鈕風格 */
        .btn-purple { background: #8e44ad; }
        .btn-red { background: #c0392b; }
        .btn-green { background: #27ae60; }
        .btn-yellow { background: #f1c40f; color: #000; }
        
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="scan-line"></div>
    <div id="game-area">
        <h1>禁區通行證驗證器</h1>
        <div class="card-display" id="zone-display">加載中...</div>
        <p>請選擇正確的通行證顏色進入：</p>
        <div class="grid">
            <button class="btn-purple" onclick="check(0)">紫色通行證</button>
            <button class="btn-red" onclick="check(1)">紅色通行證</button>
            <button class="btn-green" onclick="check(2)">綠色通行證</button>
            <button class="btn-yellow" onclick="check(3)">黃色通行證</button>
        </div>
    </div>

    <script>
        const challenges = [
            {zone: "行李處理大堂", ans: 0},
            {zone: "停機坪區域", ans: 1},
            {zone: "貨運控制中心", ans: 2},
            {zone: "行政辦公大樓", ans: 3}
        ];
        let currentIdx = 0, score = 0;

        function next() {
            if(currentIdx >= 5) {
                alert("挑戰完成！正確率: " + score + "/5");
                location.reload(); return;
            }
            document.getElementById('zone-display').innerText = challenges[currentIdx % 4].zone;
        }

        function check(colorIdx) {
            if(colorIdx === challenges[currentIdx % 4].ans) {
                score++;
                alert("✅ 驗證通過！");
            } else {
                alert("❌ 驗證失敗！進入受限區域！");
            }
            currentIdx++;
            next();
        }
        next();
    </script>
</body>
</html>
