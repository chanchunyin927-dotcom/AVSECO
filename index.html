<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>保安權限驗證系統</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; text-align: center; padding: 20px; }
        .card { background: #1a2a6c; border: 2px solid #c5a059; padding: 30px; border-radius: 20px; margin: 20px auto; max-width: 400px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { padding: 15px; border: 1px solid #555; border-radius: 10px; background: #333; color: white; cursor: pointer; transition: 0.3s; }
        button.selected { background: #c5a059; border-color: #fff; }
        #submit-btn { margin-top: 20px; padding: 15px 40px; background: #27ae60; border: none; font-size: 1.2em; border-radius: 50px; }
    </style>
</head>
<body>

    <h1>通行證權限驗證</h1>
    <div class="card">
        <h2 id="card-name">黃色通行證</h2>
        <p>此證可進入哪些區域？(可選多個)</p>
        <div class="grid" id="area-options">
            <button onclick="toggle(this)" data-id="0">客運大樓</button>
            <button onclick="toggle(this)" data-id="1">停機坪</button>
            <button onclick="toggle(this)" data-id="2">長期停坪區</button>
            <button onclick="toggle(this)" data-id="3">貨運區</button>
        </div>
        <button id="submit-btn" onclick="submit()">提交驗證</button>
    </div>

    <script>
        // 設定規則：證件名稱 與 其正確的區域代號
        const rules = [
            { card: "黃色通行證", correct: [0] }, 
            { card: "橙色通行證", correct: [1, 2] }
        ];
        
        let currentIdx = 0;
        
        function toggle(btn) {
            btn.classList.toggle('selected');
        }

        function submit() {
            const selected = Array.from(document.querySelectorAll('.selected')).map(b => parseInt(b.dataset.id));
            const correct = rules[currentIdx].correct;
            
            // 驗證邏輯：檢查選取的數量是否一致，且內容是否相符
            const isMatch = selected.length === correct.length && selected.every(val => correct.includes(val));
            
            alert(isMatch ? "✅ 正確！權限核准。" : "❌ 權限不符，請重新核對。");
            
            // 準備下一題
            currentIdx = (currentIdx + 1) % rules.length;
            document.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
            document.getElementById('card-name').innerText = rules[currentIdx].card;
        }
    </script>
</body>
</html>
