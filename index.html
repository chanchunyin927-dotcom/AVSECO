<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>保安挑戰 - 幸運轉盤</title>
    <style>
        /* 手機優化：全螢幕背景與居中 */
        body { 
            font-family: 'Arial', sans-serif; 
            margin: 0; padding: 20px; 
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d); 
            color: white; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        
        h1 { font-size: 1.5em; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }

        /* 放大轉盤到 320px，適應手機寬度 */
        .wheel-container { position: relative; margin: 40px auto; width: 320px; height: 320px; }
        #wheel { 
            width: 100%; height: 100%; border: 12px solid #fff; border-radius: 50%; 
            background: conic-gradient(#e74c3c 0deg 72deg, #3498db 72deg 144deg, #2ecc71 144deg 216deg, #f39c12 216deg 288deg, #9b59b6 288deg 360deg);
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .pointer { position: absolute; top: -30px; left: 50%; margin-left: -20px; color: #ffeb3b; font-size: 50px; }

        #quiz-box { 
            background: rgba(255,255,255,0.95); color: #333; padding: 25px; 
            border-radius: 20px; width: 90%; max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        button { 
            display: block; width: 100%; padding: 15px; margin: 10px 0;
            background: #2c3e50; color: white; border: none; border-radius: 10px; font-size: 1.1em;
        }
    </style>
</head>
<body>

    <h1>機場保安精英挑戰賽</h1>
    <div class="wheel-container">
        <div class="pointer">▼</div>
        <div id="wheel" onclick="spin()">轉動抽題</div>
    </div>
    
    <div id="quiz-box" class="hidden">
        <h2 id="category-title" style="color: #c0392b;"></h2>
        <p id="q-text" style="font-size: 1.2em; font-weight: bold;"></p>
        <div id="options"></div>
    </div>

    <script>
        const quizData = {
            "禁區管制": [{q: "禁區門應保持？", a: ["開啟", "關閉"], correct: 1}],
            "證件審核": [{q: "E字批註代表？", a: ["行李區", "辦公區"], correct: 0}]
        };
        // ... (保持原本的 spin 和 loadQuestion 邏輯)
        function spin() {
            const wheel = document.getElementById('wheel');
            wheel.style.transform = `rotate(${Math.floor(Math.random() * 1000 + 2000)}deg)`;
            setTimeout(() => {
                document.querySelector('.wheel-container').classList.add('hidden');
                document.getElementById('quiz-box').classList.remove('hidden');
                loadQuestion();
            }, 4000);
        }
        // [在此加入你原本的 loadQuestion 邏輯]
    </script>
</body>
</html>
